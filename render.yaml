services:
  - type: web
    name: auction-backend-l24v
    env: go
    rootDir: backend
    buildCommand: go build -o cricket-auction .
    startCommand: ./cricket-auction
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: cricket_auction
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PORT
        value: 8080

  - type: web
    name: cricketive-auction
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    healthCheckPath: /
    routes:
      # Serve static files directly
      - type: static
        source: /assets
        destination: /assets
      - type: static
        source: /favicon.svg
        destination: /favicon.svg
      - type: static
        source: /sounds
        destination: /sounds
      # Rewrite all other routes to index.html for SPA routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://auction-backend-l24v.onrender.com
      - key: VITE_BACKEND_PORT
        value: "443"
      - key: NODE_VERSION
        value: "18"